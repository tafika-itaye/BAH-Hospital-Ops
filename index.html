<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
<title>BAH Operations Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--navy:#0B2545;--blue:#13538A;--teal:#1B7A6E;--teal-lt:#23A08D;--gold:#C6922A;
--white:#FAFBFC;--g50:#F4F5F7;--g100:#E8EAED;--g200:#D0D4DB;--g300:#B0B7C3;
--g500:#6E7787;--g600:#5A6377;--g800:#2D3340;--red:#C0392B;--red-lt:#FDF0EF;
--green:#27AE60;--green-lt:#EAFAF1;--orange:#E67E22;--orange-lt:#FEF5E7;
--purple:#7B4B94;--sidebar-w:240px;--header-h:56px;
--font:'DM Sans',system-ui,sans-serif;--font-d:'Playfair Display',Georgia,serif;
--radius:8px;--shadow:0 2px 8px rgba(11,37,69,.08);--shadow-lg:0 8px 32px rgba(11,37,69,.12);
--transition:.2s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;font-family:var(--font);color:var(--g800);background:var(--g50)}
body{overflow:hidden}
a{color:var(--teal);text-decoration:none}

/* ===== SPLASH ===== */
.splash{position:fixed;inset:0;z-index:9999;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
.splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
.splash-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--teal),var(--teal-lt));border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;animation:sp 1.8s ease-in-out infinite}
.splash-icon svg{width:38px;height:38px;fill:#fff}
@keyframes sp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.splash h1{font-family:var(--font-d);font-size:1.4rem;color:#fff;margin-bottom:.3rem}
.splash p{font-size:.8rem;color:var(--g300);margin-bottom:2rem}
.splash-bar{width:100px;height:3px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.splash-bar div{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-lt));border-radius:3px;animation:sbar 2s ease forwards}
@keyframes sbar{0%{width:0}40%{width:55%}80%{width:88%}100%{width:100%}}
.splash-ft{position:absolute;bottom:1.5rem;font-size:.65rem;color:rgba(255,255,255,.2)}

/* ===== LOGIN ===== */
#loginPage{display:none;position:fixed;inset:0;z-index:100;background:var(--navy);overflow-y:auto;-webkit-overflow-scrolling:touch}
#loginPage.visible{display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 3rem}
.login-bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 20% 50%,rgba(27,122,110,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(19,83,138,.15) 0%,transparent 50%)}
.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-brand{text-align:center;margin-bottom:1.5rem}
.login-brand .ico{width:56px;height:56px;background:linear-gradient(135deg,var(--teal),var(--teal-lt));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:.75rem;box-shadow:0 8px 20px rgba(27,122,110,.3)}
.login-brand .ico svg{width:28px;height:28px;fill:#fff}
.login-brand h1{font-family:var(--font-d);font-size:1.35rem;color:#fff}
.login-brand p{font-size:.8rem;color:var(--g300);margin-top:.2rem}
.login-card{background:var(--white);border-radius:14px;padding:1.75rem 1.5rem 1.5rem;box-shadow:var(--shadow-lg)}
.login-card h2{font-size:1rem;font-weight:600;margin-bottom:1rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem}
.field input{width:100%;padding:.6rem .75rem;font-family:var(--font);font-size:.875rem;border:1.5px solid var(--g100);border-radius:var(--radius);background:var(--g50);outline:none;transition:border var(--transition),box-shadow var(--transition);-webkit-appearance:none}
.field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(27,122,110,.1);background:#fff}
.field input::placeholder{color:var(--g300)}
.login-error{display:none;background:var(--red-lt);border:1px solid #F5C6C2;border-radius:6px;padding:.5rem .7rem;margin-bottom:.75rem;font-size:.78rem;color:var(--red)}
.login-error.visible{display:block}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.6rem 1.25rem;font-family:var(--font);font-size:.8125rem;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;transition:all var(--transition)}
.btn-primary{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;width:100%;padding:.7rem}
.btn-primary:hover{box-shadow:0 4px 16px rgba(27,122,110,.3);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--g50);color:var(--g800);border:1.5px solid var(--g100)}
.btn-secondary:hover{border-color:var(--teal);color:var(--teal)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#A93226}
.btn-sm{padding:.4rem .75rem;font-size:.75rem}
.btn-ghost{background:transparent;color:var(--g500);border:1px solid var(--g200)}
.btn-ghost:hover{color:var(--teal);border-color:var(--teal)}
.ql{margin-top:1rem;border-top:1px solid var(--g100);padding-top:.75rem}
.ql-label{font-size:.7rem;font-weight:600;color:var(--g300);text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-bottom:.5rem}
.ql-grid{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
.ql-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .5rem;font-family:var(--font);font-size:.75rem;background:var(--g50);border:1.5px solid var(--g100);border-radius:6px;cursor:pointer;transition:all var(--transition);text-align:left}
.ql-btn:hover{border-color:var(--teal);color:var(--teal)}
.ql-btn .qi{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ql-btn .qi svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ql-btn strong{display:block;font-size:.75rem;color:var(--g800)}
.ql-btn span{font-size:.65rem;color:var(--g300)}
.ql-btn:hover strong{color:var(--teal)}
.login-ft{text-align:center;margin-top:1.25rem;font-size:.7rem;color:rgba(255,255,255,.3);line-height:1.5}
.login-ft a{color:rgba(255,255,255,.45)}

/* ===== APP SHELL ===== */
#app{display:none;height:100vh;overflow:hidden}
#app.visible{display:flex}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--navy);color:#fff;display:flex;flex-direction:column;height:100vh;flex-shrink:0;transition:transform .3s ease;z-index:50}
.sb-brand{padding:1rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand .ico{width:32px;height:32px;background:linear-gradient(135deg,var(--teal),var(--teal-lt));border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-brand .ico svg{width:16px;height:16px;fill:#fff}
.sb-brand span{font-size:.8rem;font-weight:600;line-height:1.2}
.sb-nav{flex:1;padding:.5rem 0;overflow-y:auto}
.sb-section{padding:.25rem .75rem;font-size:.6rem;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em;margin-top:.5rem}
.sb-link{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;font-size:.8rem;color:rgba(255,255,255,.55);cursor:pointer;transition:all var(--transition);border-left:3px solid transparent;margin:1px 0}
.sb-link:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.sb-link.active{background:rgba(27,122,110,.15);color:var(--teal-lt);border-left-color:var(--teal-lt)}
.sb-link svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sb-link .badge{margin-left:auto;background:var(--red);color:#fff;font-size:.6rem;font-weight:700;padding:.1rem .4rem;border-radius:10px;min-width:18px;text-align:center}
.sb-user{padding:.75rem 1rem;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:.6rem}
.sb-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0}
.sb-uinfo{flex:1;min-width:0}
.sb-uinfo strong{display:block;font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-uinfo span{font-size:.65rem;color:rgba(255,255,255,.4)}
.sb-logout{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:4px}
.sb-logout:hover{color:var(--red)}
.sb-logout svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--header-h);background:#fff;border-bottom:1px solid var(--g100);display:flex;align-items:center;padding:0 1.25rem;gap:.75rem;flex-shrink:0}
.menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:4px}
.menu-toggle svg{width:22px;height:22px;stroke:var(--g600);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.topbar h2{font-size:1rem;font-weight:600;flex:1}
.topbar-actions{display:flex;align-items:center;gap:.5rem}
.content{flex:1;overflow-y:auto;padding:1.25rem;-webkit-overflow-scrolling:touch}

/* ===== COMPONENTS ===== */
/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;margin-bottom:1.25rem}
.card{background:#fff;border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);border-left:3px solid var(--g200)}
.card-teal{border-left-color:var(--teal)}
.card-blue{border-left-color:var(--blue)}
.card-gold{border-left-color:var(--gold)}
.card-red{border-left-color:var(--red)}
.card-green{border-left-color:var(--green)}
.card-purple{border-left-color:var(--purple)}
.card .label{font-size:.7rem;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.04em}
.card .value{font-size:1.5rem;font-weight:700;color:var(--g800);margin:.25rem 0}
.card .sub{font-size:.7rem;color:var(--g300)}

/* Tables */
.tbl-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:1rem}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--g100);flex-wrap:wrap;gap:.5rem}
.tbl-head h3{font-size:.875rem;font-weight:600}
.tbl-filters{display:flex;gap:.4rem;flex-wrap:wrap}
.tbl-filters select,.tbl-filters input{font-family:var(--font);font-size:.75rem;padding:.35rem .5rem;border:1.5px solid var(--g100);border-radius:6px;background:#fff;outline:none}
.tbl-filters select:focus,.tbl-filters input:focus{border-color:var(--teal)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead{background:var(--g50)}
th{text-align:left;padding:.6rem .75rem;font-size:.7rem;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:.6rem .75rem;border-top:1px solid var(--g100);vertical-align:middle}
tr:hover{background:rgba(27,122,110,.02)}
.tbl-empty{text-align:center;padding:2rem;color:var(--g300);font-size:.8rem}

/* Badges */
.badge{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600}
.badge-open{background:#E8F4FD;color:var(--blue)}
.badge-progress{background:var(--orange-lt);color:var(--orange)}
.badge-resolved{background:var(--green-lt);color:var(--green)}
.badge-closed{background:var(--g50);color:var(--g500)}
.badge-critical{background:var(--red-lt);color:var(--red)}
.badge-high{background:#FDEDEC;color:#C0392B}
.badge-medium{background:var(--orange-lt);color:var(--orange)}
.badge-low{background:var(--green-lt);color:var(--green)}
.badge-active{background:var(--green-lt);color:var(--green)}
.badge-draft{background:var(--orange-lt);color:var(--orange)}
.badge-review{background:#EDE7F6;color:var(--purple)}
.badge-near-miss{background:var(--orange-lt);color:var(--orange)}
.badge-incident{background:var(--red-lt);color:var(--red)}
.badge-no-harm{background:var(--green-lt);color:var(--green)}
.badge-sentinel{background:var(--red-lt);color:var(--red)}

/* Clickable rows */
.clickable{cursor:pointer}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(11,37,69,.4);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal-overlay.visible{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);animation:fadeUp .3s ease}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--g100)}
.modal-header h3{font-size:.95rem;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;padding:4px;color:var(--g300)}
.modal-close:hover{color:var(--g800)}
.modal-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.modal-body{padding:1.25rem}
.modal-footer{padding:.75rem 1.25rem;border-top:1px solid var(--g100);display:flex;justify-content:flex-end;gap:.5rem}

/* Form inside modal */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.form-row.full{grid-template-columns:1fr}
.form-group{margin-bottom:.75rem}
.form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--g500);margin-bottom:.25rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.5rem .65rem;font-family:var(--font);font-size:.8rem;border:1.5px solid var(--g100);border-radius:6px;background:#fff;outline:none;transition:border var(--transition)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal)}
.form-group textarea{resize:vertical;min-height:80px}

/* Detail view */
.detail-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:1rem}
.detail-header{padding:1rem 1.25rem;border-bottom:1px solid var(--g100);display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
.detail-header h3{font-size:1rem;font-weight:600}
.detail-body{padding:1.25rem}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:1rem}
.detail-field .df-label{font-size:.7rem;font-weight:600;color:var(--g500);text-transform:uppercase;margin-bottom:.2rem}
.detail-field .df-value{font-size:.85rem;color:var(--g800)}

/* Timeline */
.timeline{border-left:2px solid var(--g100);padding-left:1.25rem;margin-top:1rem}
.tl-item{position:relative;padding-bottom:1rem}
.tl-item::before{content:'';position:absolute;left:-1.35rem;top:.25rem;width:8px;height:8px;border-radius:50%;background:var(--teal);border:2px solid #fff}
.tl-item .tl-time{font-size:.65rem;color:var(--g300)}
.tl-item .tl-text{font-size:.8rem;color:var(--g800);margin-top:.15rem}
.tl-item .tl-user{font-size:.7rem;color:var(--g500)}

/* KPI bars */
.kpi-card{background:#fff;border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);margin-bottom:.75rem}
.kpi-card h4{font-size:.8rem;font-weight:600;margin-bottom:.75rem}
.kpi-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem}
.kpi-label{font-size:.75rem;color:var(--g600);width:140px;flex-shrink:0}
.kpi-bar{flex:1;height:8px;background:var(--g100);border-radius:4px;overflow:hidden}
.kpi-fill{height:100%;border-radius:4px;transition:width .6s ease}
.kpi-val{font-size:.75rem;font-weight:600;width:40px;text-align:right}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--g800);color:#fff;padding:.65rem 1rem;border-radius:var(--radius);font-size:.8rem;z-index:999;animation:toastIn .3s ease;box-shadow:var(--shadow-lg)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* KB article */
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.75rem}
.kb-card{background:#fff;border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);cursor:pointer;transition:all var(--transition);border-left:3px solid var(--teal)}
.kb-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.kb-card h4{font-size:.85rem;font-weight:600;margin-bottom:.3rem}
.kb-card p{font-size:.75rem;color:var(--g500);line-height:1.4}
.kb-card .kb-meta{margin-top:.5rem;font-size:.65rem;color:var(--g300)}
.kb-article{background:#fff;border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow)}
.kb-article h3{font-size:1.1rem;font-weight:600;margin-bottom:.75rem}
.kb-article p,.kb-article li{font-size:.85rem;line-height:1.6;color:var(--g600);margin-bottom:.5rem}
.kb-article ol,.kb-article ul{padding-left:1.25rem}
.kb-article h4{font-size:.9rem;font-weight:600;margin:1rem 0 .5rem;color:var(--g800)}

/* Policy detail */
.attest-list{margin-top:1rem}
.attest-row{display:flex;align-items:center;gap:.5rem;padding:.4rem 0;border-bottom:1px solid var(--g100);font-size:.8rem}
.attest-check{color:var(--green);font-weight:700}
.attest-pending{color:var(--g300)}

/* Responsive */
@media(max-width:768px){
 .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);z-index:100}
 .sidebar.open{transform:translateX(0)}
 .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
 .sb-overlay.visible{display:block}
 .menu-toggle{display:block}
 .cards{grid-template-columns:1fr 1fr}
 .form-row{grid-template-columns:1fr}
 .detail-grid{grid-template-columns:1fr 1fr}
 .kb-grid{grid-template-columns:1fr}
 .tbl-head{flex-direction:column;align-items:flex-start}
 .ql-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
 .cards{grid-template-columns:1fr}
 .detail-grid{grid-template-columns:1fr}
 #loginPage.visible{padding:1rem .75rem 2rem}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
 <div class="splash-icon"><svg viewBox="0 0 24 24"><path d="M9 2h6v6h6v6h-6v6H9v-6H3V8h6z"/></svg></div>
 <h1>Blantyre Adventist Hospital</h1>
 <p>Operations Platform</p>
 <div class="splash-bar"><div></div></div>
 <div class="splash-ft">Powered by TechNexus MW</div>
</div>

<!-- LOGIN -->
<div id="loginPage">
 <div class="login-bg"></div>
 <div class="login-wrap">
  <div class="login-brand">
   <div class="ico"><svg viewBox="0 0 24 24"><path d="M9 2h6v6h6v6h-6v6H9v-6H3V8h6z"/></svg></div>
   <h1>Blantyre Adventist Hospital</h1>
   <p>Operations Platform</p>
  </div>
  <div class="login-card">
   <h2>Staff Login</h2>
   <div class="login-error" id="loginError"></div>
   <div class="field"><label>Username</label><input type="text" id="loginUser" placeholder="Enter your staff ID"></div>
   <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="Enter your password"></div>
   <button class="btn btn-primary" id="loginBtn">Sign In</button>
   <div class="ql">
    <div class="ql-label">Quick Access - Demo Accounts</div>
    <div class="ql-grid" id="qlGrid"></div>
   </div>
  </div>
  <div class="login-ft">&copy; 2026 Blantyre Adventist Hospital. All rights reserved.<br>Powered by <a href="https://technexusmw.com" target="_blank" rel="noopener">TechNexus MW</a></div>
 </div>
</div>

<!-- APP -->
<div id="app">
 <div class="sb-overlay" id="sbOverlay"></div>
 <nav class="sidebar" id="sidebar">
  <div class="sb-brand">
   <div class="ico"><svg viewBox="0 0 24 24"><path d="M9 2h6v6h6v6h-6v6H9v-6H3V8h6z"/></svg></div>
   <span>BAH Operations</span>
  </div>
  <div class="sb-nav" id="sbNav"></div>
  <div class="sb-user" id="sbUser"></div>
 </nav>

 {id:'KB-001',title:'How to Submit a Ticket',category:'Getting Started',content:'<h4>Submitting a New Ticket</h4><p>Navigate to <strong>Tickets</strong> in the sidebar and click the <strong>New Ticket</strong> button. Fill in the required fields:</p><ol><li><strong>Title</strong> - Brief description of the issue</li><li><strong>Department</strong> - Select IT, Maintenance, or Procurement</li><li><strong>Category</strong> - Choose the most relevant category</li><li><strong>Priority</strong> - Low, Medium, High, or Critical</li><li><strong>Description</strong> - Detailed explanation of the issue</li><li><strong>Location</strong> - Where the issue is occurring</li></ol><p>After submission, you will receive a ticket ID for tracking. The system will automatically route your ticket to the appropriate team.</p><h4>Priority Guidelines</h4><p><strong>Critical:</strong> Patient safety at risk, complete system failure<br><strong>High:</strong> Significant impact on operations, multiple users affected<br><strong>Medium:</strong> Single user or non-urgent equipment issue<br><strong>Low:</strong> Minor inconvenience, enhancement request</p>'},
 {id:'KB-002',title:'Understanding SLA Response Times',category:'Ticketing',content:'<h4>Service Level Agreements</h4><p>Response and resolution times are defined by ticket priority:</p><ul><li><strong>Critical:</strong> Response within 15 minutes, resolution within 4 hours</li><li><strong>High:</strong> Response within 1 hour, resolution within 8 hours</li><li><strong>Medium:</strong> Response within 4 hours, resolution within 24 hours</li><li><strong>Low:</strong> Response within 8 hours, resolution within 72 hours</li></ul><p>Escalation occurs automatically if SLA deadlines are approaching. Department heads are notified when a ticket exceeds 75% of its SLA window.</p>'},
 {id:'KB-003',title:'Reporting an Incident or Near Miss',category:'Compliance',content:'<h4>When to Report</h4><p>All staff are required to report any event that caused or could have caused harm to a patient, visitor, or staff member. This includes:</p><ul><li>Medication errors or near misses</li><li>Equipment failures during patient care</li><li>Falls or injuries on hospital premises</li><li>Security incidents</li><li>Data breaches or privacy violations</li></ul><h4>Anonymous Reporting</h4><p>You may choose to report anonymously. Anonymous reports are treated with the same priority and investigation rigor as identified reports. The goal is to build a culture of safety, not blame.</p><h4>Severity Classification</h4><p><strong>No Harm:</strong> Event occurred but no harm resulted<br><strong>Near Miss:</strong> Event was caught before reaching the patient<br><strong>Incident:</strong> Event reached the patient but caused minimal or no harm<br><strong>Sentinel Event:</strong> Serious event requiring immediate investigation</p>'},
 {id:'KB-004',title:'Password Reset and Account Access',category:'IT Support',content:'<h4>Self-Service Password Reset</h4><p>If you have forgotten your password or your account is locked:</p><ol><li>Contact IT Support by submitting a ticket under IT &gt; System Access</li><li>Or call the IT Help Desk at extension 2200</li><li>Or email technexus_mw@proton.me</li></ol><h4>New Account Requests</h4><p>Department heads can request new accounts for incoming staff by submitting a ticket with the following information: full name, employee ID, department, required system access level, and start date.</p>'},
 {id:'KB-005',title:'Medical Equipment Maintenance Requests',category:'Maintenance',content:'<h4>Preventive vs Corrective Maintenance</h4><p><strong>Preventive:</strong> Scheduled maintenance is handled automatically based on equipment maintenance calendars. You do not need to submit tickets for scheduled maintenance.</p><p><strong>Corrective:</strong> For equipment malfunctions or failures, submit a ticket under Maintenance with the following details:</p><ul><li>Equipment name and asset tag number</li><li>Location of the equipment</li><li>Description of the malfunction</li><li>Any error codes displayed</li><li>Whether patient care is affected (this determines priority)</li></ul><h4>Do Not Attempt Repairs</h4><p>Staff should never attempt to repair medical equipment themselves. Tag the equipment as "Out of Service" and submit a maintenance ticket immediately.</p>'},
 {id:'KB-006',title:'Procurement Request Process',category:'Procurement',content:'<h4>How to Request Supplies or Equipment</h4><ol><li>Submit a ticket under Procurement &gt; Supply Request</li><li>Include: item description, quantity, preferred vendor (if known), budget code, and required delivery date</li><li>Department head approval is required for orders over MK 500,000</li><li>Finance approval is required for orders over MK 2,000,000</li></ol><h4>Emergency Procurement</h4><p>For urgent/emergency supplies (e.g., critical medication shortages), mark the ticket as Critical priority. Emergency procurement bypasses the standard approval chain but requires post-approval documentation within 48 hours.</p>'}

function buildLoginButtons(){
 var grid = $('qlGrid');
 var keys = Object.keys(USERS);
 var icons = {admin:I.bolt,'it.support':I.monitor,nurse:I.heart,doctor:I.steth,compliance:I.shield,'dept.head':I.users};
 grid.innerHTML = keys.map(function(k){
  var u = USERS[k];
  return '<button class="ql-btn" data-user="'+k+'"><span class="qi" style="background:'+u.color+'">'+icons[k]+'</span><span><strong>'+u.role+'</strong><span>'+k+'</span></span></button>';
 }).join('');
}

function login(username){
 var u = USERS[username];
 if(!u){
  $('loginError').textContent = 'Invalid username. Use a demo account.';
  $('loginError').classList.add('visible');
  return;
 }
 currentUser = {username:username, name:u.name, role:u.role, color:u.color, init:u.init};
 sessionStorage.setItem('bah_session', JSON.stringify(currentUser));
 $('loginPage').classList.remove('visible');
 $('loginPage').style.display='none';
 $('app').classList.add('visible');
 buildApp();
 navigate('dashboard');
}

$('loginBtn').addEventListener('click', function(){
 login($('loginUser').value.trim().toLowerCase());
});
$('loginUser').addEventListener('keydown', function(e){ if(e.key==='Enter') login(this.value.trim().toLowerCase()); });
$('loginPass').addEventListener('keydown', function(e){ if(e.key==='Enter') login($('loginUser').value.trim().toLowerCase()); });
$('qlGrid').addEventListener('click', function(e){
 var btn = e.target.closest('.ql-btn');
 if(btn){
  var u = btn.dataset.user;
  $('loginUser').value = u;
  $('loginPass').value = '********';
  login(u);
 }
});

function logout(){
 sessionStorage.removeItem('bah_session');
 currentUser = null;
 $('app').classList.remove('visible');
 $('loginPage').style.display='';
 $('loginPage').classList.add('visible');
 $('loginUser').value='';
 $('loginPass').value='';
 $('loginError').classList.remove('visible');
}

/* ========== ROUTER ========== */
function navigate(view, detail){
 currentView = view;
 currentDetail = detail || null;
 $('sidebar').classList.remove('open');
 $('sbOverlay').classList.remove('visible');
 buildSidebar();
 renderView();
 $('content').scrollTop = 0;
}

function renderView(){
 switch(currentView){
  case 'dashboard': renderDashboard(); break;
  case 'tickets': currentDetail ? renderTicketDetail(currentDetail) : renderTickets(); break;
  case 'policies': currentDetail ? renderPolicyDetail(currentDetail) : renderPolicies(); break;
  case 'incidents': renderIncidents(); break;
  case 'kpis': renderKPIs(); break;
  case 'kb': currentDetail ? renderKBArticle(currentDetail) : renderKB(); break;
  default: renderDashboard();
 }
}

function renderTickets(){
 $('pageTitle').textContent = 'All Tickets';
 $('topActions').innerHTML = '<button class="btn btn-primary btn-sm" id="newTicketBtn">'+I.plus+' New Ticket</button>';

 var h = '<div class="tbl-wrap"><div class="tbl-head"><h3>Tickets ('+tickets.length+')</h3><div class="tbl-filters">';
 h += '<select id="fDept"><option value="">All Depts</option>'+DEPTS.map(function(d){return '<option>'+d+'</option>'}).join('')+'</select>';
 h += '<select id="fStatus"><option value="">All Status</option>'+STATUSES.map(function(s){return '<option>'+s+'</option>'}).join('')+'</select>';
 h += '<select id="fPriority"><option value="">All Priority</option>'+PRIORITIES.map(function(p){return '<option>'+p+'</option>'}).join('')+'</select>';
 h += '<input type="text" id="fSearch" placeholder="Search...">';
 h += '</div></div>';
 h += '<table><thead><tr><th>ID</th><th>Title</th><th>Dept</th><th>Category</th><th>Priority</th><th>Status</th><th>Assignee</th><th>Updated</th></tr></thead>';
 h += '<tbody id="ticketBody"></tbody></table></div>';

 $('content').innerHTML = h;
 $('newTicketBtn').onclick = function(){ openNewTicketModal(); };

 function filterTickets(){
  var dept = $('fDept').value;
  var status = $('fStatus').value;
  var pri = $('fPriority').value;
  var q = $('fSearch').value.toLowerCase();
  var filtered = tickets.filter(function(t){
   if(dept && t.dept !== dept) return false;
   if(status && t.status !== status) return false;
   if(pri && t.priority !== pri) return false;
   if(q && t.title.toLowerCase().indexOf(q)===-1 && t.id.toLowerCase().indexOf(q)===-1) return false;
   return true;
  }).sort(function(a,b){return new Date(b.updated)-new Date(a.updated)});

  var tbody = $('ticketBody');
  if(!filtered.length){
   tbody.innerHTML = '<tr><td colspan="8" class="tbl-empty">No tickets match your filters.</td></tr>';
   return;
  }
  tbody.innerHTML = filtered.map(function(t){
   var assignee = t.assignee ? (USERS[t.assignee]||{}).name||t.assignee : '<span style="color:var(--g300)">Unassigned</span>';
   return '<tr class="clickable" data-ticket="'+t.id+'"><td>'+t.id+'</td><td>'+t.title+'</td><td>'+t.dept+'</td><td>'+t.category+'</td><td><span class="badge badge-'+t.priority.toLowerCase()+'">'+t.priority+'</span></td><td><span class="badge badge-'+statusClass(t.status)+'">'+t.status+'</span></td><td>'+assignee+'</td><td>'+fmt(t.updated)+'</td></tr>';
  }).join('');

  tbody.querySelectorAll('[data-ticket]').forEach(function(row){
   row.onclick = function(){ navigate('tickets', this.dataset.ticket); };
  });
 }

 filterTickets();
 ['fDept','fStatus','fPriority'].forEach(function(id){ $(id).onchange = filterTickets; });
 $('fSearch').oninput = filterTickets;
}

 };

  if(!title||!dept||!cat){ toast('Please fill all required fields','error'); return; }

   status:'Open', reporter:currentUser.username, assignee:null,

   description:$('ntDesc').value.trim()||'No description provided.',
   asset:$('ntAsset').value.trim()||null,

 // Status update
 if(inc.status !== 'Closed'){
  h += '<div class="form-group" style="margin-top:1rem"><label>Update Status</label><select id="incStatusSel"><option value="">Select...</option><option>Open</option><option>Under Investigation</option><option>Resolved</option><option>Closed</option></select></div>';
 }

 var footer = '';
 if(inc.status !== 'Closed'){
  footer = '<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'modalOverlay\').classList.remove(\'visible\')">Close</button><button class="btn btn-primary btn-sm" id="updateIncStatus">Update</button>';
 } else {
  footer = '<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'modalOverlay\').classList.remove(\'visible\')">Close</button>';
 }

 openModal(inc.id + ' - ' + inc.title, h, footer);

 if($('updateIncStatus')){
  $('updateIncStatus').onclick = function(){
   var ns = $('incStatusSel').value;
   if(!ns){ toast('Select a status','error'); return; }
   inc.status = ns;
   closeModal();
   toast('Incident status updated','success');
   renderIncidents();
  };
 }
}

function openNewIncidentModal(){
 var h = '<div class="form-group"><label>Title *</label><input type="text" id="niTitle" placeholder="Brief description"></div>';
 h += '<div class="form-row"><div class="form-group"><label>Type *</label><select id="niType"><option>Near Miss</option><option>Incident</option></select></div>';
 h += '<div class="form-group"><label>Severity *</label><select id="niSev">'+['Low','Medium','High','Critical'].map(function(s){return '<option>'+s+'</option>'}).join('')+'</select></div></div>';
 h += '<div class="form-row"><div class="form-group"><label>Department *</label><select id="niDept"><option value="">Select...</option>'+['Clinical','IT','Maintenance','Procurement','Administration'].map(function(d){return '<option>'+d+'</option>'}).join('')+'</select></div>';
 h += '<div class="form-group"><label>Report Anonymously</label><select id="niAnon"><option value="false">No</option><option value="true">Yes</option></select></div></div>';
 h += '<div class="form-group"><label>Description *</label><textarea id="niDesc" placeholder="What happened? Include details about time, location, and people involved..."></textarea></div>';
 h += '<div class="form-group"><label>Immediate Actions Taken</label><textarea id="niActions" placeholder="What actions were taken immediately after the event?"></textarea></div>';

 openModal('Report Incident / Near Miss', h, '<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'modalOverlay\').classList.remove(\'visible\')">Cancel</button><button class="btn btn-primary btn-sm" id="submitInc">Submit Report</button>');

 $('submitInc').onclick = function(){
  var title = $('niTitle').value.trim();
  var dept = $('niDept').value;
  var desc = $('niDesc').value.trim();
  if(!title||!dept||!desc){ toast('Please fill all required fields','error'); return; }
  incidents.unshift({
   id:genIncId(), type:$('niType').value, severity:$('niSev').value,
   title:title, dept:dept, reporter:currentUser.username,
   created:new Date(), description:desc, status:'Open',
   anonymous:$('niAnon').value==='true',
   actions:$('niActions').value.trim()||null
  });
  closeModal();
  toast('Incident report submitted','success');
  navigate('incidents');
 };
}

// --- KPIs ---
function renderKPIs(){
 $('pageTitle').textContent = 'KPI Dashboard';
 $('topActions').innerHTML = '';

 var totalT = tickets.length;
 var resolved = tickets.filter(function(t){return t.status==='Resolved'||t.status==='Closed'}).length;
 var resRate = totalT ? Math.round(resolved/totalT*100) : 0;

 var critOpen = tickets.filter(function(t){return t.priority==='Critical'&&(t.status==='Open'||t.status==='In Progress')}).length;
 var critTotal = tickets.filter(function(t){return t.priority==='Critical'}).length;
 var critRes = critTotal ? Math.round((critTotal-critOpen)/critTotal*100) : 100;

 var totalPol = policies.length;
 var activePol = policies.filter(function(p){return p.status==='Active'}).length;
 var polRate = totalPol ? Math.round(activePol/totalPol*100) : 0;

 var totalAttest = 0, doneAttest = 0;
 policies.forEach(function(p){ totalAttest += p.attested.length + p.pending.length; doneAttest += p.attested.length; });
 var attestRate = totalAttest ? Math.round(doneAttest/totalAttest*100) : 0;

 var totalInc = incidents.length;
 var closedInc = incidents.filter(function(i){return i.status==='Closed'||i.status==='Resolved'}).length;
 var incCloseRate = totalInc ? Math.round(closedInc/totalInc*100) : 0;

 var nmCount = incidents.filter(function(i){return i.type==='Near Miss'}).length;
 var reportRate = totalInc > 0 ? Math.round(nmCount/totalInc*100) : 0;

 // Per department
 var deptStats = {};
 DEPTS.forEach(function(d){
  var dt = tickets.filter(function(t){return t.dept===d});
  var dr = dt.filter(function(t){return t.status==='Resolved'||t.status==='Closed'}).length;
  deptStats[d] = {total:dt.length, resolved:dr, rate:dt.length?Math.round(dr/dt.length*100):0};
 });

 function bar(label,val,color){
  var c = color || 'var(--teal)';
  return '<div class="kpi-row"><div class="kpi-label">'+label+'</div><div class="kpi-bar"><div class="kpi-fill" style="width:'+val+'%;background:'+c+'"></div></div><div class="kpi-val" style="color:'+c+'">'+val+'%</div></div>';
 }

 var h = '<div class="cards">';
 h += '<div class="card card-teal"><div class="label">Ticket Resolution Rate</div><div class="value">'+resRate+'%</div><div class="sub">'+resolved+' of '+totalT+' resolved</div></div>';
 h += '<div class="card card-red"><div class="label">Critical Response</div><div class="value">'+critRes+'%</div><div class="sub">'+critOpen+' critical still open</div></div>';
 h += '<div class="card card-blue"><div class="label">Policy Compliance</div><div class="value">'+polRate+'%</div><div class="sub">'+activePol+' of '+totalPol+' active</div></div>';
 h += '<div class="card card-gold"><div class="label">Attestation Rate</div><div class="value">'+attestRate+'%</div><div class="sub">'+doneAttest+' of '+totalAttest+' completed</div></div>';
 h += '<div class="card card-green"><div class="label">Incident Close Rate</div><div class="value">'+incCloseRate+'%</div><div class="sub">'+closedInc+' of '+totalInc+' closed</div></div>';
 h += '<div class="card card-purple"><div class="label">Near Miss Reporting</div><div class="value">'+reportRate+'%</div><div class="sub">'+nmCount+' near misses of '+totalInc+' reports</div></div>';
 h += '</div>';

 // Department breakdown
 h += '<div class="kpi-card"><h4>Ticket Resolution by Department</h4>';
 DEPTS.forEach(function(d){
  var s = deptStats[d];
  var c = d==='IT'?'var(--blue)':d==='Maintenance'?'var(--gold)':'var(--teal)';
  h += bar(d+' ('+s.resolved+'/'+s.total+')', s.rate, c);
 });
 h += '</div>';

 // Policy attestation breakdown
 h += '<div class="kpi-card"><h4>Policy Attestation Progress</h4>';
 policies.forEach(function(p){
  var total = p.attested.length + p.pending.length;
  var pct = total ? Math.round(p.attested.length/total*100) : 0;
  var c = pct===100?'var(--green)':pct>=50?'var(--gold)':'var(--red)';
  h += bar(p.id+': '+p.title.substring(0,30)+(p.title.length>30?'...':''), pct, c);
 });
 h += '</div>';

 // Incident severity breakdown
 h += '<div class="kpi-card"><h4>Incident Severity Distribution</h4>';
 ['Low','Medium','High','Critical'].forEach(function(s){
  var count = incidents.filter(function(i){return i.severity===s}).length;
  var pct = totalInc ? Math.round(count/totalInc*100) : 0;
  var c = s==='Low'?'var(--green)':s==='Medium'?'var(--gold)':s==='High'?'var(--orange)':'var(--red)';
  h += bar(s+' ('+count+')', pct, c);
 });
 h += '</div>';

 $('content').innerHTML = h;
}

// --- KNOWLEDGE BASE ---
function renderKB(){
 $('pageTitle').textContent = 'Knowledge Base';
 $('topActions').innerHTML = '';

 var h = '<div style="margin-bottom:1rem"><input type="text" id="kbSearch" placeholder="Search articles..." style="width:100%;max-width:400px;padding:.55rem .75rem;font-size:.85rem;border:1.5px solid var(--g100);border-radius:var(--radius);outline:none;font-family:var(--font)"></div>';
 h += '<div class="kb-grid" id="kbGrid"></div>';

 $('content').innerHTML = h;

 function renderCards(q){
  var list = kbArticles;
  if(q){
   q = q.toLowerCase();
   list = list.filter(function(a){return a.title.toLowerCase().indexOf(q)>-1||a.category.toLowerCase().indexOf(q)>-1});
  }
  $('kbGrid').innerHTML = list.length ? list.map(function(a){
   var preview = a.content.replace(/<[^>]+>/g,'').substring(0,100)+'...';
   return '<div class="kb-card" data-kb="'+a.id+'"><h4>'+a.title+'</h4><p>'+preview+'</p><div class="kb-meta">'+a.category+'</div></div>';
  }).join('') : '<p style="color:var(--g300);font-size:.85rem">No articles match your search.</p>';

  $('kbGrid').querySelectorAll('[data-kb]').forEach(function(card){
   card.onclick = function(){ navigate('kb', this.dataset.kb); };
  });
 }
 renderCards('');
 $('kbSearch').oninput = function(){ renderCards(this.value.trim()); };
}

function renderKBArticle(id){
 var a = kbArticles.find(function(art){return art.id===id});
 if(!a){ renderKB(); return; }
 $('pageTitle').textContent = a.title;
 $('topActions').innerHTML = '<button class="btn btn-ghost btn-sm" id="backKB">'+I.back+' Back to Articles</button>';

 $('content').innerHTML = '<div class="kb-article"><div class="kb-meta" style="margin-bottom:.75rem">'+a.category+'</div><h3>'+a.title+'</h3>'+a.content+'</div>';
 $('backKB').onclick = function(){ navigate('kb'); };
}

/* ========== APP INIT ========== */
function buildApp(){
 buildSidebar();
}

/* ========== SPLASH & SESSION ========== */
buildLoginButtons();

var resumed = false;
try {
 var saved = sessionStorage.getItem('bah_session');
 if(saved){
  var s = JSON.parse(saved);
  if(USERS[s.username]){
   resumed = true;
   currentUser = s;
   $('splash').classList.add('hidden');
   $('splash').style.display='none';
   $('loginPage').style.display='none';
   $('app').classList.add('visible');
   buildApp();
   navigate('dashboard');
  }
 }
} catch(e){}

if(!resumed){
 setTimeout(function(){
  $('splash').classList.add('hidden');
  setTimeout(function(){ $('splash').style.display='none'; },600);
  $('loginPage').classList.add('visible');
 }, 2500);
}

})();
</script>
